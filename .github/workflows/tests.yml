name: Tests

on:
  pull_request:
    branches: [main]
##
jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run unit tests
        run: pytest Diplom/tests/unit/ --tb=short -v

      - name: Run UI/API tests
        run: pytest Diplom/tests/ --ignore=Diplom/tests/unit/ --tb=short -v
        env:
          SELENIUM_HEADLESS: "true"

